name: calendar_condor_v2
asset_class: futures
version: "2.0"
enabled: true

# ── Strategy-specific parameters ─────────────────────────────────────
params:
  # Entry conditions
  entry_vwap_z: 2.5
  entry_spread_z: 3.0
  min_spread_std: 8.0          # 從 5.0 提高，微型台點值較小
  min_expected_profit: 15.0    # 從 10.0 提高，微型台需要更多點數
  max_adx: 25.0
  max_breakout_strength: 0.50
  min_volume_spike: 0.7
  
  # Exit conditions
  exit_spread_z: -0.5
  stop_loss_spread_z: 3.5
  max_holding_bars: 100
  min_holding_bars: 10
  min_profit_points: 15        # 從 10 提高，微型台需要更多點數
  
  # Risk management
  position_size: 1
  allow_night_session: false
  min_bars_from_session_open: 6
  cooldown_bars: 20            # 新增：交易後冷卻時間

# ── Risk limits (enforced by monitor, NOT the strategy) ──────────────
risk:
  max_positions: 1
  stop_loss_type: atr       # "atr" | "fixed" | "percent"
  stop_loss_mult: 1.2

# ── Market regime filter ─────────────────────────────────────────────
regime_filter:
  allowed: ["weak"]
  min_adx: 20

# ── Backtest metadata (for dashboard catalog) ────────────────────────
backtest:
  pf: 0.0
  wr: 0.0
  max_dd: 0.0
  total_trades: 0
  period: ""