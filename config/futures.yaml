active_strategy: counter_vwap
execution:
  broker_fee_per_side: 20.0
  exchange_fee_per_side: 0.0
  initial_balance: 100000
  limit_offset_pts: 2.0
  market_slippage_pts: 1.0
  order_type: MKP
  range_protection_pts: 3.0
  tax_rate: 2.0e-05
  tick_size: 1.0
live_trading: false
monitoring:
  callback:
    buffer_size: 100
    health_check_secs: 60
    use_tick_data: false
  data_mode: hybrid
  pb_confirmation_bars: 12
  poll_interval_secs: 30
risk_mgmt:
  atr_length: 14
  atr_multiplier: 1.5
  break_even_pts: 100  # 浮盈 100pts 保本 (原 50 太早，R:R ≈ 1:1 才保本)
  exit_on_vwap: true
  ma_stop_length: 20
  ma_stop_multiplier: 1.0
  ma_stop_ticks: 10
  ma_stop_type: below
  skip_hours: []
  stop_loss_pts: 30
  time_filter_enabled: false
  trailing_stop_distance_pts: 50  # 追蹤距離 50pts (鎖住 0.5R 利潤)
  trailing_stop_enabled: true
  trailing_stop_trigger_pts: 100  # 浮盈 100pts 啟動追蹤 (接近 1:1 R:R)
strategy:
  auto_select: true
  active_strategy: counter_vwap
  counter_mode:
    enabled: true
    auto_regime: true
    confirm_bars: 5
    atr_sl_mult: 2.0
    exit_on_vwap: true
  psar_breakout:
    acceleration: 0.02
    acceleration_max: 0.2
    atr_mult: 2.0
    sma_length: 50
    min_adx: 10  # 從 15 降到 10，夜盤也能捕捉趨勢初期
  vol_squeeze:
    vol_multiplier: 1.5
    entry_score: 20
    atr_mult: 1.5
  entry_score: 20
  regime_filter: mid
  length: 20
  use_squeeze: true
  use_pullback: false
  partial_exit:
    enabled: true
    tp1_lots: 1
    tp1_pts: 200  # TP1 200pts (R:R ≈ 1:2, 原 100pts 比停損 108pts 還近!)
  weights:
    5m: 0.4
    15m: 0.4
    1h: 0.2
trade_mgmt:
  allow_long: true
  allow_short: true
  force_close_at_end: false
  lots_per_trade: 1
  max_positions: 1
